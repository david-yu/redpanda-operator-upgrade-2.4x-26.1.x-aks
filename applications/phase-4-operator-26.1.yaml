# Phase 4 — Operator binary + chart 25.3.x → 26.1.x
#
# 26.1 introduces the multicluster runtime CRDs (StretchCluster, etc.).
# These are gated behind --multicluster on the chart's pre-install CRD
# Job, so a single-cluster operator install does NOT pick them up unless
# you explicitly opt in. Keep crds.experimental and crds.multicluster
# false for this customer.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redpanda-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: redpanda-operator
  source:
    repoURL: https://charts.redpanda.com
    chart: operator
    targetRevision: 26.1.3
    helm:
      releaseName: redpanda-operator
      valueFiles:
        - $values/values/operator-26.1.yaml
  sources:
    - repoURL: https://charts.redpanda.com
      chart: operator
      targetRevision: 26.1.3
      helm:
        releaseName: redpanda-operator
        valueFiles:
          - $values/values/operator-26.1.yaml
    - repoURL: https://github.com/david-yu/redpanda-operator-upgrade-2.4x-26.1.x-aks
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - PruneLast=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations

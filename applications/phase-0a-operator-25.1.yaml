# Phase 0a — Operator binary v2.4.x → 25.1.x
#
# This is a normal `helm upgrade` of the `operator` chart from chart
# version 2.4.6 → 25.1.x. Chart NAME is unchanged (verified against the
# `operator/v2.4.6` git tag — chart was already named `operator` at
# v2.4.6, not `redpanda-operator`). No `--replace` needed.
#
# Caveat: chart versions < 25.2.3 are not currently published to
# https://charts.redpanda.com. If your existing Application's targetRevision
# points at 2.4.6 from that repo, ArgoCD's pre-upgrade fetch will fail.
# Workaround: pin `targetRevision: 25.2.4` (the earliest publicly
# available) or reconstruct the chart from git for the duration of the
# Phase 0a window.
#
# No broker restart in this phase.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redpanda-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: redpanda-operator        # If the v2.4.6 release was in
                                        # `redpanda-system` (the convention
                                        # at the time), KEEP that namespace
                                        # here so this isn't a fresh install.
                                        # Migrating namespaces would require a
                                        # full uninstall/reinstall and is
                                        # out of scope for this upgrade.
  source:
    repoURL: https://charts.redpanda.com
    chart: operator
    targetRevision: 25.1.3
    helm:
      releaseName: redpanda-operator
      valueFiles:
        - $values/values/operator-25.1.yaml
  sources:
    - repoURL: https://charts.redpanda.com
      chart: operator
      targetRevision: 25.1.3
      helm:
        releaseName: redpanda-operator
        valueFiles:
          - $values/values/operator-25.1.yaml
    - repoURL: https://github.com/david-yu/redpanda-operator-upgrade-2.4x-26.1.x-aks
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: false                      # OFF for the upgrade window — opt-in
                                        # to delete-on-drift only after final
                                        # phase completes.
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - PruneLast=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        # The operator regenerates CRD annotations on each release; ignore.
        - /metadata/annotations
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs

# Phase 0a — Operator binary v2.4.x → 25.1.x
#
# IMPORTANT: the chart name changes from `redpanda-operator` (the v2.4.x
# era) to `operator` (25.x onwards). This means ArgoCD treats it as a
# fresh release. After committing this file:
#
#     argocd app sync redpanda-operator --replace
#
# is required ONCE so the prior `redpanda-operator` Helm release is
# uninstalled and the new `operator` release is installed. CRDs survive
# this delete (they're cluster-scoped). No broker restart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redpanda-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: redpanda-operator        # NEW namespace — the v2.4.x release
                                        # lived in `redpanda-system`. We move
                                        # to the new convention here. If the
                                        # customer has a strong reason to
                                        # keep `redpanda-system`, change this
                                        # field; the operator works in either.
  source:
    repoURL: https://charts.redpanda.com
    chart: operator
    targetRevision: 25.1.3
    helm:
      releaseName: redpanda-operator
      valueFiles:
        - $values/values/operator-25.1.yaml
  sources:
    - repoURL: https://charts.redpanda.com
      chart: operator
      targetRevision: 25.1.3
      helm:
        releaseName: redpanda-operator
        valueFiles:
          - $values/values/operator-25.1.yaml
    - repoURL: https://github.com/david-yu/redpanda-operator-upgrade-2.4x-26.1.x-aks
      targetRevision: main
      ref: values
  syncPolicy:
    automated:
      prune: false                      # OFF for the upgrade window — opt-in
                                        # to delete-on-drift only after final
                                        # phase completes.
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - PruneLast=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        # The operator regenerates CRD annotations on each release; ignore.
        - /metadata/annotations
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs

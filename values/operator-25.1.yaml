# Helm values for the operator chart at 25.1.x.
#
# Minimum-overlay style: only fields that differ from chart defaults are
# pinned here. Default-off knobs like crds.experimental, crds.multicluster,
# and vectorizedControllers.enabled are intentionally NOT set so the
# overlay tracks chart defaults if those change in a future patch.
crds:
  enabled: true              # install stable CRDs via the pre-install Job
                             # (chart default is false; we want them on)

monitoring:
  enabled: true              # render the ServiceMonitor; assumes
                             # prometheus-operator CRDs are installed.

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 1,    memory: 512Mi }

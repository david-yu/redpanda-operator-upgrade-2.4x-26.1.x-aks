# Standalone Console v3 — ConfigMap + Deployment + Service.
#
# Used during the blue/green Console v2 → v3 cutover
# (docs/console-bluegreen-upgrade.md, Step 1).
#
# Applied at Phase 0b alongside the still-running operator-managed
# Console v2. After Phase 2b moves Console under operator management
# via manifests/console-cr.yaml, these resources are deleted.
#
# Bump replicas to 2 in production for HA.

apiVersion: v1
kind: ConfigMap
metadata:
  name: redpanda-console-v3
  namespace: redpanda
data:
  config.yaml: |
    metricsNamespace: console
    serveFrontend: true
    server:
      gracefulShutdownTimeout: 30s
      listenPort: 8080
    kafka:
      brokers:
        - redpanda-0.redpanda.redpanda.svc.cluster.local:9092
        - redpanda-1.redpanda.redpanda.svc.cluster.local:9092
        - redpanda-2.redpanda.redpanda.svc.cluster.local:9092
    schemaRegistry:
      enabled: true
      urls: [http://redpanda-0.redpanda.redpanda.svc.cluster.local:8081]
    redpanda:
      adminApi:
        enabled: true
        urls: [http://redpanda-0.redpanda.redpanda.svc.cluster.local:9644]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-console-v3
  namespace: redpanda
  labels:
    app.kubernetes.io/name: console
    console-version: v3
spec:
  replicas: 1
  selector:
    matchLabels:
      console-version: v3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console
        console-version: v3
    spec:
      containers:
        - name: console
          image: docker.redpanda.com/redpandadata/console:v3.7.0
          args: [-config.filepath=/etc/console/config.yaml]
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: cfg
              mountPath: /etc/console
          readinessProbe:
            httpGet:
              path: /admin/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /admin/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: cfg
          configMap:
            name: redpanda-console-v3
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-console-v3
  namespace: redpanda
spec:
  type: ClusterIP
  selector:
    console-version: v3
  ports:
    - name: http
      port: 8080
      targetPort: 8080
